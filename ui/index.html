<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Mathmax Web</title>
	<link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
	<script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
	
	<style>
		/* Kontrastreiches und klares Design für bessere Zugänglichkeit */
		body { 
			font-family: Arial, Helvetica, sans-serif; 
			background: #ffffff; 
			color: #000000;
			display: flex;
			justify-content: center;
			padding-top: 2rem;
			line-height: 1.5;
		}
		main { 
			background: #ffffff; 
			padding: 2rem; 
			border: 2px solid #000000;
			border-radius: 8px; 
			width: 100%;
			max-width: 650px;
		}
		h1 {
			margin-top: 0;
			font-size: 1.5rem;
			border-bottom: 2px solid #000000;
			padding-bottom: 0.5rem;
		}
		label {
			display: block;
			font-weight: bold;
			margin-top: 1rem;
		}
		input[type="text"], select { 
			width: 100%; 
			padding: 0.75rem; 
			margin: 0.5rem 0 1rem 0; 
			border: 2px solid #000000; 
			border-radius: 4px; 
			box-sizing: border-box; 
			font-size: 1.1rem; 
		}
		input[type="text"]:focus, select:focus, details:focus-within summary {
			outline: 3px solid #005fcc;
			outline-offset: 2px;
		}
		input[type="text"][readonly] {
			background: #f0f0f0;
			border-style: dashed;
		}
		details {
			margin-bottom: 1rem;
			border: 1px solid #000000;
			padding: 0.5rem;
			border-radius: 4px;
		}
		summary {
			font-weight: bold;
			cursor: pointer;
			padding: 0.5rem;
		}
		#loading { 
			font-weight: bold; 
			text-align: center;
			padding: 2rem 0;
			font-size: 1.2rem;
		}
		.sr-only {
			position: absolute;
			width: 1px;
			height: 1px;
			padding: 0;
			margin: -1px;
			overflow: hidden;
			clip: rect(0, 0, 0, 0);
			border: 0;
		}
		.help-grid {
			display: grid;
			grid-template-columns: 1fr;
			gap: 10px;
			font-size: 0.95rem;
		}
		code {
			background-color: #eee;
			padding: 2px 4px;
			border-radius: 3px;
			font-weight: bold;
		}
	</style>

	<py-config type="json">
	{
		"packages": ["sympy", "mpmath"],
		"fetch": [{
			"from": "../core",
			"to_folder": "core",
			"files": ["calculator.py"]
		}]
	}
	</py-config>
</head>
<body>
	<main>
		<h1 id="ui-title">Mathmax Web</h1>
		
		<div id="loading" aria-live="polite">
			<span id="ui-loading">Loading Math Module, please wait...</span>
		</div>
		
		<div id="app-content" style="display:none;">
			
			<details id="settings-section">
				<summary id="ui-settings">Settings</summary>
				<div>
					<label for="decimals" id="ui-decimals-lbl">Decimal places:</label>
					<select id="decimals">
						<option value="5">5</option>
						<option value="10" selected>10</option>
						<option value="15">15</option>
						<option value="20">20</option>
					</select>
					
					<label for="angle_mode" id="ui-angle-lbl">Angle mode:</label>
					<select id="angle_mode">
						<option value="deg" id="ui-angle-deg" selected>Degrees (Deg)</option>
						<option value="rad" id="ui-angle-rad">Radians (Rad)</option>
					</select>

					<label for="lang_override" id="ui-lang-lbl">Language (Display):</label>
					<select id="lang_override">
						<option value="auto" id="ui-lang-auto" selected>Auto-detect</option>
						<option value="en">English</option>
						<option value="de">Deutsch</option>
					</select>
				</div>
			</details>

			<details id="help-section">
				<summary id="ui-help">Help & Functions</summary>
				<div class="help-grid" id="ui-help-content">
					</div>
			</details>
			
			<section aria-labelledby="calc-heading">
				<h2 id="calc-heading" class="sr-only">Calculator</h2>
				
				<label for="calc-input" id="ui-input-lbl">Input (Press Enter to calculate):</label>
				<input type="text" id="calc-input" autocomplete="off">
				
				<label for="calc-output" id="ui-output-lbl">Result:</label>
				<input type="text" id="calc-output" readonly aria-live="polite">
			</section>
		</div>
	</main>

	<script>
		const i18n = {
			en: {
				title: "Mathmax Web",
				loading: "Loading Math Module, please wait...",
				settings: "Settings",
				decimals: "Decimal places:",
				angle: "Angle mode:",
				angleDeg: "Degrees (Deg)",
				angleRad: "Radians (Rad)",
				langLbl: "Language:",
				langAuto: "Auto-detect",
				help: "Help & Functions",
				input: "Input (Press Enter to calculate):",
				output: "Result:",
				helpContent: `
					<p>Type your mathematical expression and press <b>Enter</b>.</p>
					<ul>
						<li><b>Basics:</b> <code>+</code>, <code>-</code>, <code>*</code>, <code>/</code>, <code>^</code> (Power), <code>!</code> (Factorial)</li>
						<li><b>Trigonometry:</b> <code>sin(x)</code>, <code>cos(x)</code>, <code>tan(x)</code>, <code>asin(x)</code> (also hyperbolic: <code>sinh</code>...)</li>
						<li><b>Algebra / Equations:</b> <code>nsolve(x^2 - 4 = 0)</code>, <code>lsolve(x + y = 10; x - y = 2)</code></li>
						<li><b>Calculus:</b> <code>nderive(x^2; 2; 1)</code> (Function; Point; Order), <code>algs(x^2; 1)</code> (Symbolic derivative)</li>
						<li><b>Vectors:</b> <code>[1; 2; 3]</code>, <code>cross(v1; v2)</code>, <code>dot(v1; v2)</code>, <code>len(v)</code></li>
						<li><b>Statistics:</b> <code>min(...)</code>, <code>max(...)</code>, <code>mittel(...)</code> (Mean), <code>sd(...)</code> (Std Dev)</li>
						<li><b>Combinatorics:</b> <code>binco(n; k)</code>, <code>binom(n; p; k)</code>, <code>cbinom(n; p; k)</code></li>
						<li><b>Custom Functions:</b> <code>def f(x): x^2 + 2</code>, then use <code>f(3)</code>. Show all: <code>showdef</code>. Delete: <code>deldef f</code> or <code>deldef</code> (all).</li>
					</ul>`
			},
			de: {
				title: "Mathmax Web",
				loading: "Lade Mathematik-Modul, bitte warten...",
				settings: "Einstellungen",
				decimals: "Dezimalstellen:",
				angle: "Winkelmaß:",
				angleDeg: "Gradmaß (Deg)",
				angleRad: "Bogenmaß (Rad)",
				langLbl: "Sprache:",
				langAuto: "Automatisch",
				help: "Hilfe & Funktionen",
				input: "Eingabe (Mit Enter bestätigen):",
				output: "Ergebnis:",
				helpContent: `
					<p>Geben Sie Ihren mathematischen Ausdruck ein und drücken Sie <b>Enter</b>.</p>
					<ul>
						<li><b>Grundlagen:</b> <code>+</code>, <code>-</code>, <code>*</code>, <code>/</code>, <code>^</code> (Potenz), <code>!</code> (Fakultät)</li>
						<li><b>Trigonometrie:</b> <code>sin(x)</code>, <code>cos(x)</code>, <code>tan(x)</code>, <code>asin(x)</code> (auch hyperbolisch: <code>sinh</code>...)</li>
						<li><b>Algebra / Gleichungen:</b> <code>nsolve(x^2 - 4 = 0)</code>, <code>lsolve(x + y = 10; x - y = 2)</code></li>
						<li><b>Analysis:</b> <code>nderive(x^2; 2; 1)</code> (Funktion; Stelle; Grad), <code>algs(x^2; 1)</code> (Symbolische Ableitung)</li>
						<li><b>Vektoren:</b> <code>[1; 2; 3]</code>, <code>cross(v1; v2)</code>, <code>dot(v1; v2)</code>, <code>len(v)</code></li>
						<li><b>Statistik:</b> <code>min(...)</code>, <code>max(...)</code>, <code>mittel(...)</code>, <code>sd(...)</code> (Standardabw.)</li>
						<li><b>Kombinatorik:</b> <code>binco(n; k)</code>, <code>binom(n; p; k)</code>, <code>cbinom(n; p; k)</code></li>
						<li><b>Eigene Funktionen:</b> <code>def f(x): x^2 + 2</code>, danach <code>f(3)</code> nutzen. Anzeigen: <code>showdef</code>. Löschen: <code>deldef f</code> oder <code>deldef</code> (alle).</li>
					</ul>`
			}
		};

		let currentLang = navigator.language.startsWith('de') ? 'de' : 'en';

		function applyLanguage(lang) {
			const t = i18n[lang];
			document.documentElement.lang = lang;
			document.getElementById('ui-title').innerText = t.title;
			document.getElementById('ui-loading').innerText = t.loading;
			document.getElementById('ui-settings').innerText = t.settings;
			document.getElementById('ui-decimals-lbl').innerText = t.decimals;
			document.getElementById('ui-angle-lbl').innerText = t.angle;
			document.getElementById('ui-angle-deg').innerText = t.angleDeg;
			document.getElementById('ui-angle-rad').innerText = t.angleRad;
			document.getElementById('ui-lang-lbl').innerText = t.langLbl;
			document.getElementById('ui-lang-auto').innerText = t.langAuto;
			document.getElementById('ui-help').innerText = t.help;
			document.getElementById('ui-input-lbl').innerText = t.input;
			document.getElementById('ui-output-lbl').innerText = t.output;
			document.getElementById('ui-help-content').innerHTML = t.helpContent;
		}

		document.getElementById('lang_override').addEventListener('change', (e) => {
			if (e.target.value === 'auto') {
				currentLang = navigator.language.startsWith('de') ? 'de' : 'en';
			} else {
				currentLang = e.target.value;
			}
			applyLanguage(currentLang);
			
			// Optional: Trigger PyScript to reload translations by saving to local storage
			window.localStorage.setItem('mathmax_lang', e.target.value);
		});

		// Initial load
		const savedLang = window.localStorage.getItem('mathmax_lang');
		if (savedLang && savedLang !== 'auto') {
			currentLang = savedLang;
			document.getElementById('lang_override').value = savedLang;
		}
		applyLanguage(currentLang);
	</script>

	<script type="py">
		import traceback
		import json
		from pyscript import document, window
		from pyodide.ffi import create_proxy

		try:
			import core.calculator as calc
			
			document.getElementById("loading").style.display = "none"
			document.getElementById("app-content").style.display = "block"
			
			input_el = document.getElementById("calc-input")
			output_el = document.getElementById("calc-output")
			dec_el = document.getElementById("decimals")
			ang_el = document.getElementById("angle_mode")

			# --- 1. DATEN LADEN ---
			saved_settings = window.localStorage.getItem("mathmax_settings")
			if saved_settings:
				try:
					settings = json.loads(saved_settings)
					dec_el.value = settings.get("decimals", "10")
					ang_el.value = settings.get("angle_mode", "deg")
				except:
					pass

			saved_defs = window.localStorage.getItem("mathmax_defs")
			if saved_defs:
				try:
					calc.USER_DEFINITIONS.update(json.loads(saved_defs))
				except:
					pass

			# --- 2. DATEN SPEICHERN ---
			def save_state(*args):
				settings = {"decimals": dec_el.value, "angle_mode": ang_el.value}
				window.localStorage.setItem("mathmax_settings", json.dumps(settings))
				window.localStorage.setItem("mathmax_defs", json.dumps(calc.USER_DEFINITIONS))

			# Event Listener für Dropdowns (Speichern bei Klick)
			proxy_save = create_proxy(save_state)
			dec_el.addEventListener("change", proxy_save)
			ang_el.addEventListener("change", proxy_save)

			# --- 3. BERECHNUNG ---
			def calculate(e):
				if e.key == "Enter":
					ausdruck = input_el.value
					decimals = int(dec_el.value)
					angle_mode = ang_el.value
					
					# Get language directly from JS variable logic via UI dropdown or navigator
					lang_override = document.getElementById('lang_override').value
					if lang_override == 'auto':
						nav_lang = str(window.navigator.language)
						active_lang = 'de' if nav_lang.startswith('de') else 'en'
					else:
						active_lang = lang_override
					
					if not ausdruck.strip():
						return
						
					try:
						ergebnis = calc.evaluiere(ausdruck, decimals=decimals, angle_mode=angle_mode, lang=active_lang)
						output_el.value = str(ergebnis)
						
						# Wenn eine Funktion definiert oder gelöscht wurde -> Speichern
						if ausdruck.startswith("def ") or ausdruck.startswith("deldef"):
							save_state()
							
					except Exception as ex:
						err_prefix = "Fehler" if active_lang == 'de' else "Error"
						output_el.value = f"{err_prefix}: {ex}"
					
					# Fokus setzen und Inhalt markieren
					output_el.focus()
					output_el.select()
						
			input_el.addEventListener("keydown", create_proxy(calculate))
			input_el.focus()
			
		except Exception as e:
			err_msg = f"Error during load / Fehler beim Laden:\n{traceback.format_exc()}"
			document.getElementById("ui-loading").innerText = err_msg
	</script>
</body>
</html>
